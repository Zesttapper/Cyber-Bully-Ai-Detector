<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>CyberShield</title>

<style>
:root{
  --primary:#6366f1;
  --primaryGlow:rgba(99,102,241,0.5);
  --danger:#ff4d6d;
  --success:#00d084;
  --bgLight:linear-gradient(135deg,#eef2ff,#f8faff);
  --bgDark:linear-gradient(135deg,#0f111a,#1a1d29);
}

*{
  box-sizing:border-box;
  margin:0;
  padding:0;
  font-family:"Segoe UI",system-ui,sans-serif;
}

body{
  width:360px;
  padding:20px;
  background:var(--bgLight);
  transition:0.4s ease;
  overflow:hidden;
}

body.dark{
  background:var(--bgDark);
  color:#fff;
}

.container{
  background:rgba(255,255,255,0.72);
  backdrop-filter:blur(25px);
  border-radius:28px;
  padding:22px;
  box-shadow:
    0 25px 60px rgba(0,0,0,0.15),
    inset 0 1px 0 rgba(255,255,255,0.4);
  animation:floatIn .5s cubic-bezier(.21,1,.36,1);
  position:relative;
  transition:.4s ease;
}

body.dark .container{
  background:rgba(25,28,40,0.65);
}

@keyframes floatIn{
  from{opacity:0;transform:translateY(25px) scale(.95);}
  to{opacity:1;transform:translateY(0) scale(1);}
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:18px;
  padding-bottom:12px;
  border-bottom:1px solid rgba(0,0,0,0.05);
}

body.dark .header{
  border-bottom:1px solid rgba(255,255,255,0.06);
}

.title{
  font-size:20px;
  font-weight:600;
  display:flex;
  align-items:center;
  gap:8px;
}

.live-dot{
  width:8px;
  height:8px;
  border-radius:50%;
  background:var(--success);
  box-shadow:0 0 10px var(--success);
  animation:pulse 1.5s infinite;
}

@keyframes pulse{
  0%{box-shadow:0 0 0 0 var(--success);}
  70%{box-shadow:0 0 0 8px transparent;}
  100%{box-shadow:0 0 0 0 transparent;}
}

.icon-btn{
  background:none;
  border:none;
  font-size:18px;
  cursor:pointer;
  transition:.3s;
}

.icon-btn:hover{
  transform:rotate(20deg) scale(1.1);
}

/* STATUS */
.status{
  text-align:center;
  padding:12px;
  border-radius:14px;
  font-weight:600;
  font-size:13px;
  margin-bottom:20px;
  transition:.3s ease;
  backdrop-filter:blur(8px);
}

.status.active{
  background:linear-gradient(135deg,rgba(0,208,132,.15),rgba(0,208,132,.05));
  color:var(--success);
  box-shadow:0 0 18px rgba(0,208,132,.25);
}

.status.paused{
  background:linear-gradient(135deg,rgba(255,77,109,.15),rgba(255,77,109,.05));
  color:var(--danger);
}


.section{
  display:flex;
  align-items:center;
  gap:14px;
  margin-bottom:16px;
  padding:10px;
  border-radius:16px;
  transition:.25s ease;
  cursor:pointer;
}

.section:hover{
  background:rgba(99,102,241,.06);
  transform:translateX(4px);
}

body.dark .section:hover{
  background:rgba(139,92,246,.08);
}


.label-text strong{
  font-size:14px;
}

.label-text span{
  font-size:12px;
  opacity:.6;
}

/* SWITCH */
.switch{
  position:relative;
  width:46px;
  height:24px;
}

.switch input{
  opacity:0;
  width:0;
  height:0;
}

.slider{
  position:absolute;
  inset:0;
  background:#d1d5db;
  border-radius:50px;
  transition:.4s;
}

.slider:before{
  content:"";
  position:absolute;
  height:18px;
  width:18px;
  left:3px;
  bottom:3px;
  background:white;
  border-radius:50%;
  transition:.4s;
  box-shadow:0 3px 8px rgba(0,0,0,.25);
}

input:checked + .slider{
  background:linear-gradient(135deg,var(--primary),#8b5cf6);
  box-shadow:
    0 0 12px var(--primaryGlow),
    inset 0 0 4px rgba(255,255,255,.5);
}


input:checked + .slider:before{
  transform:translateX(22px);
}

/* BUTTON */
.site-button{
  width:100%;
  padding:13px;
  border:none;
  border-radius:18px;
  background:linear-gradient(135deg,var(--primary),#8b5cf6);
  color:white;
  font-weight:600;
  cursor:pointer;
  position:relative;
  overflow:hidden;
  transition:.3s;
}

.site-button:hover{
  transform:translateY(-3px);
  box-shadow:0 12px 30px rgba(99,102,241,.4);
}

.site-button:active{
  transform:scale(.97);
}

/* Ripple */
.site-button::after{
  content:"";
  position:absolute;
  width:0;
  height:0;
  background:rgba(255,255,255,.4);
  border-radius:50%;
  transform:translate(-50%,-50%);
  opacity:0;
  pointer-events:none;
}

.site-button:active::after{
  width:200px;
  height:200px;
  opacity:1;
  transition:0s;
}



</style>
</head>

<body>

<div class="container" role="region" aria-label="CyberShield Control Panel">

  <div class="header">
    <div class="title">
      CyberShield
      <div class="live-dot" aria-hidden="true"></div>
    </div>
    <button id="themeToggle" class="icon-btn" aria-label="Toggle Theme">🌙</button>
  </div>

  <div id="stats" class="stats"></div>

  <div id="status" class="status active" role="status">
    Protection Active
  </div>

  <div class="section">
    <label class="switch">
      <input type="checkbox" id="enabled">
      <span class="slider"></span>
    </label>
    <div class="label-text">
      <strong>Enable Protection</strong>
      <span>Turn shield on or off</span>
    </div>
  </div>

  <div class="section">
    <label class="switch">
      <input type="checkbox" id="blur">
      <span class="slider"></span>
    </label>
    <div class="label-text">
      <strong>Blur Mode</strong>
      <span>Blur instead of highlight</span>
    </div>
  </div>

  <div class="section">
    <label class="switch">
      <input type="checkbox" id="notify">
      <span class="slider"></span>
    </label>
    <div class="label-text">
      <strong>Notifications</strong>
      <span>Show detection alerts</span>
    </div>
  </div>

  <button id="siteBtn" class="site-button" aria-live="polite"></button>

</div>

<script src="popup.js"></script>
</body>

</html>
